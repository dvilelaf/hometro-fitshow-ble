<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HomeTro BLE Control</title>
    <link rel="stylesheet" href="/static/styles.css?v=notifications-20260528b" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">HomeTro BLE</p>
          <h1>Treadmill Control</h1>
        </div>
        <div class="connection-box">
          <div class="connection-actions">
            <button id="scanButton" type="button">Search</button>
            <button id="connectionButton" type="button">Disconnect</button>
            <button
              id="notificationButton"
              type="button"
              class="notification-button"
              aria-label="Notifications"
              aria-expanded="false"
            >
              <span class="notification-icon" aria-hidden="true"></span>
              <span id="notificationBadge" class="notification-badge" hidden>0</span>
            </button>
          </div>
          <p id="connectionMessage" class="connection-message" aria-live="polite"></p>
          <div id="notificationPanel" class="notification-panel" hidden>
            <div class="notification-panel-header">
              <strong>Notifications</strong>
              <button id="clearNotificationsButton" type="button">Clear</button>
            </div>
            <div id="notificationList" class="notification-list"></div>
          </div>
        </div>
      </header>

      <section id="devicePanel" class="device-panel" hidden>
        <div id="deviceList" class="device-list"></div>
      </section>

      <section class="dashboard">
        <div class="primary-metric">
          <p class="label">Current speed</p>
          <div class="metric-value">
            <strong><span id="speed">0.0</span></strong>
            <span>km/h</span>
          </div>
          <div class="target-chip">
            Target <span id="target">-</span> km/h
          </div>
        </div>

        <div class="metric-grid">
          <div>
            <p class="label">Distance</p>
            <div class="metric-value">
              <strong><span id="distanceKm">0.000</span></strong>
              <span>km</span>
            </div>
          </div>
          <div>
            <p class="label">Calories</p>
            <div class="metric-value">
              <strong><span id="calories">-</span></strong>
              <span>kcal</span>
            </div>
          </div>
          <div>
            <p class="label">Time</p>
            <div class="metric-value">
              <strong id="elapsed">00:00</strong>
              <span>min</span>
            </div>
          </div>
        </div>

        <div class="control-panel">
          <div class="buttons">
            <button id="startButton" type="button" class="primary">Start</button>
            <button id="stopButton" type="button" class="danger">Stop</button>
          </div>
          <label for="speedInput">Set speed</label>
          <div class="speed-row">
            <div class="speed-scale">
              <input id="speedInput" type="range" min="1" max="14" step="0.1" value="1" />
              <div id="speedTicks" class="speed-ticks" aria-hidden="true"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div id="notificationToast" class="notification-toast" hidden></div>
    <script src="/static/app.js?v=notifications-20260528b"></script>
  </body>
</html>
